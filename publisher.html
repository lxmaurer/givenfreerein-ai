<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Given Free Rein Publisher</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'DM Sans', Arial, sans-serif;
      background: #f5f1ea;
      color: #2a3d2a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #2a3d2a;
      color: #fff;
      padding: 32px 0 20px 0;
      text-align: center;
      font-family: 'Playfair Display', serif;
      letter-spacing: 0.5px;
      position: relative;
    }
    .header-title {
      font-size: 2.5rem;
      margin: 0;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .header-sub {
      font-size: 1.1rem;
      font-family: 'DM Sans', Arial, sans-serif;
      font-weight: 500;
      margin-top: 6px;
      color: #e0e6e0;
      letter-spacing: 0.2px;
    }
    .clear-link {
      position: absolute;
      right: 32px;
      top: 36px;
      color: #e0e6e0;
      font-size: 1rem;
      text-decoration: underline;
      cursor: pointer;
      font-family: 'DM Sans', Arial, sans-serif;
      background: none;
      border: none;
      padding: 0;
    }
    .main {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
      height: calc(100vh - 90px);
    }
    .left-panel {
      width: 380px;
      background: #fff;
      box-shadow: 2px 0 8px rgba(42,61,42,0.04);
      padding: 36px 32px 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .input-label {
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      margin-bottom: 7px;
      color: #2a3d2a;
    }
    select, input[type="text"], input[type="file"] {
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 1rem;
      padding: 8px 10px;
      border: 1px solid #b5b5a7;
      border-radius: 5px;
      background: #f5f1ea;
      color: #2a3d2a;
      width: 100%;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    .api-key-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .api-key-row input {
      flex: 1 1 auto;
      margin-bottom: 0;
    }
    .images-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 8px;
      margin-bottom: 8px;
    }
    .img-thumb {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 7px;
      border: 2px solid transparent;
      cursor: pointer;
      position: relative;
      transition: border 0.2s;
      background: #f5f1ea;
    }
    .img-thumb.selected {
      border: 2.5px solid #2a9d4a;
      box-shadow: 0 0 0 2px #b7e2c1;
    }
    .img-thumb.selected::after {
      content: '\2714';
      position: absolute;
      top: 7px;
      right: 10px;
      background: #2a9d4a;
      color: #fff;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .tone-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .tone-btn {
      flex: 1 1 auto;
      padding: 7px 0;
      border-radius: 5px;
      border: 1.5px solid #b5b5a7;
      background: #f5f1ea;
      color: #2a3d2a;
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s, border 0.15s;
    }
    .tone-btn.selected {
      background: #2a3d2a;
      color: #fff;
      border: 1.5px solid #2a3d2a;
    }
    .generate-btn {
      margin-top: 18px;
      padding: 13px 0;
      width: 100%;
      background: #2a3d2a;
      color: #fff;
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 1.13rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.18s;
    }
    .generate-btn:active {
      background: #1d291d;
    }
    .right-panel {
      flex: 1 1 auto;
      background: #f5f1ea;
      padding: 36px 36px 36px 36px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      overflow-y: auto;
    }
    .output-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(42,61,42,0.07);
      padding: 28px 26px 22px 26px;
      margin-bottom: 0;
      position: relative;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .output-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
    }
    .dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.ig { background: #5a6bbf; }
    .dot.fb { background: #1877f2; }
    .dot.nl { background: #e6b800; }
    .output-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.18rem;
      font-weight: 700;
      color: #2a3d2a;
      margin: 0;
    }
    .output-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }
    .char-count {
      font-size: 0.98rem;
      color: #7a7a6a;
      font-family: 'DM Sans', Arial, sans-serif;
      margin-right: 2px;
    }
    .copy-btn {
      background: #2a3d2a;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 6px 16px;
      font-size: 1rem;
      font-family: 'DM Sans', Arial, sans-serif;
      cursor: pointer;
      transition: background 0.15s;
    }
    .copy-btn:active {
      background: #1d291d;
    }
    textarea {
      width: 100%;
      min-height: 90px;
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 1.05rem;
      border: 1px solid #b5b5a7;
      border-radius: 6px;
      background: #f5f1ea;
      color: #2a3d2a;
      padding: 10px;
      resize: vertical;
      margin-top: 7px;
      margin-bottom: 0;
      box-sizing: border-box;
    }
    @media (max-width: 900px) {
      .main { flex-direction: column; }
      .left-panel { width: 100%; max-width: 100vw; box-shadow: none; }
      .right-panel { padding: 18px 8px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">Given Free Rein</span>
    <div class="header-sub">Publisher</div>
    <button class="clear-link" id="clearBtn" title="Clear outputs">Clear</button>
  </div>
  <div class="main">
    <div class="left-panel">
      <div>
        <div class="input-label">Article</div>
        <select id="articleSelect">
          <option value="" disabled selected>Loading articles...</option>
        </select>
      </div>
      <div>
        <div class="input-label">Tone</div>
        <div class="tone-row">
          <button class="tone-btn selected" data-tone="Editorial">Editorial</button>
          <button class="tone-btn" data-tone="Warm & conversational">Warm & conversational</button>
        </div>
        <div class="tone-row">
          <button class="tone-btn" data-tone="Literary & evocative">Literary & evocative</button>
          <button class="tone-btn" data-tone="Factual & informative">Factual & informative</button>
        </div>
      </div>
      <div>
        <div class="input-label">OpenAI API Key</div>
        <div class="api-key-row">
          <input type="text" id="apiKeyInput" placeholder="OpenAI API key" autocomplete="off" />
        </div>
      </div>
      <div>
        <div class="input-label">Images</div>
        <div id="imagesSection">
          <div id="imagesPlaceholder" style="color:#888; font-size:0.98rem; margin:10px 0 0 2px;">Select an article to load images</div>
          <div class="images-grid" id="imagesGrid" style="display:none;"></div>
          <div id="imgCounter" style="font-size:1rem; color:#2a3d2a; margin-top:6px;"></div>
        </div>
      </div>
      <button class="generate-btn" id="generateBtn">Generate</button>
    </div>
    <div class="right-panel">
      <div class="output-card" id="igCard">
        <div class="output-header">
          <span class="dot ig"></span>
          <span class="output-title">Instagram</span>
          <div class="output-actions">
            <span class="char-count" id="igCount">0</span>
            <button class="copy-btn" id="igCopy">Copy</button>
          </div>
        </div>
        <textarea id="igOutput" spellcheck="true"></textarea>
      </div>
      <div class="output-card" id="fbCard">
        <div class="output-header">
          <span class="dot fb"></span>
          <span class="output-title">Facebook</span>
          <div class="output-actions">
            <span class="char-count" id="fbCount">0</span>
            <button class="copy-btn" id="fbCopy">Copy</button>
          </div>
        </div>
        <textarea id="fbOutput" spellcheck="true"></textarea>
      </div>
      <div class="output-card" id="nlCard">
        <div class="output-header">
          <span class="dot nl"></span>
          <span class="output-title">Newsletter</span>
          <div class="output-actions">
            <span class="char-count" id="nlCount">0</span>
            <button class="copy-btn" id="nlCopy">Copy</button>
          </div>
        </div>
        <textarea id="nlOutput" spellcheck="true"></textarea>
      </div>
    </div>
  </div>
  <script>
// --- State ---
let articles = [];
let selectedArticle = null;
let articleText = '';
let articleTitle = '';
let articleUrl = '';
let selectedImages = [];
let tone = 'Editorial';

// --- Utility Functions ---
function stripHtml(html) {
  let tmp = document.createElement('div');
  tmp.innerHTML = html.replace(/<script[\s\S]*?<\/script>/gi, '').replace(/<style[\s\S]*?<\/style>/gi, '');
  let text = tmp.textContent || tmp.innerText || '';
  return text.replace(/\s+/g, ' ').trim();
}
function getTitle(html) {
  let m = html.match(/<title>(.*?)<\/title>/i);
  return m ? m[1].trim() : '';
}
function getArticleUrl(article) {
  return `https://givenfreerein.com/article-${article.id}.html`;
}
function updateCharCounts() {
  document.getElementById('igCount').textContent = document.getElementById('igOutput').value.length;
  document.getElementById('fbCount').textContent = document.getElementById('fbOutput').value.length;
  document.getElementById('nlCount').textContent = document.getElementById('nlOutput').value.length;
}
function saveApiKey(key) {
  localStorage.setItem('gfr_publisher_api_key', key);
}
function loadApiKey() {
  return localStorage.getItem('gfr_publisher_api_key') || '';
}
function resetOutputs() {
  document.getElementById('igOutput').value = '';
  document.getElementById('fbOutput').value = '';
  document.getElementById('nlOutput').value = '';
  updateCharCounts();
}
function extractImagesFromHtml(html, articleFolder) {
  // 1. All img src values use the prefix ../../images/
  //    Strip that prefix to get the normalized path
  // 2. Only show images where the normalized path starts with images/[article-folder]/
  const imgRegex = /<img[^>]+src=["']([^"'>]+)["'][^>]*>/gi;
  let match;
  let srcs = new Set();
  const prefix = '../../images/';
  const folderPattern = `images/${articleFolder}/`;
  while ((match = imgRegex.exec(html)) !== null) {
    let src = match[1];
    if (src.startsWith(prefix)) {
      let norm = src.slice(prefix.length); // strip ../../images/
      norm = 'images/' + norm; // ensure normalized path always starts with images/
      if (norm.startsWith(folderPattern)) {
        srcs.add(norm);
      }
    }
  }
  return Array.from(srcs);
}
function renderImageThumbnails(imageSrcs) {
  const grid = document.getElementById('imagesGrid');
  grid.innerHTML = '';
  selectedImages = [];
  imageSrcs.forEach(src => {
    const div = document.createElement('div');
    div.className = 'img-thumb';
    div.tabIndex = 0;
    div.title = src.split('/').pop();
    const img = document.createElement('img');
    img.src = src;
    img.alt = src.split('/').pop();
    img.style.width = '100%';
    img.style.height = '100%';
    img.style.objectFit = 'cover';
    div.appendChild(img);
    div.addEventListener('click', function() {
      if (div.classList.contains('selected')) {
        div.classList.remove('selected');
        selectedImages = selectedImages.filter(f => f !== src);
      } else {
        div.classList.add('selected');
        selectedImages.push(src);
      }
      updateImgCounter();
    });
    grid.appendChild(div);
  });
  updateImgCounter();
}
function updateImgCounter() {
  const counter = document.getElementById('imgCounter');
  counter.textContent = `${selectedImages.length} image${selectedImages.length === 1 ? '' : 's'} selected`;
}

// --- Load Articles ---
async function loadArticles() {
  try {
    let res = await fetch('content/articles.json');
    let data = await res.json();
    articles = data.articles || [];
    articles.sort((a, b) => (b.published_date || '').localeCompare(a.published_date || ''));
    let sel = document.getElementById('articleSelect');
    sel.innerHTML = '<option value="" disabled selected>Select an article...</option>';
    for (let art of articles) {
      let t = art.title || art.id;
      sel.innerHTML += `<option value="${art.id}">${t}</option>`;
    }
  } catch (e) {
    console.error('Failed to load articles:', e);
  }
}

// --- Article Select Handler ---
document.getElementById('articleSelect').addEventListener('change', async function() {
  let id = this.value;
  selectedArticle = articles.find(a => a.id === id);
  if (!selectedArticle) return;
  articleUrl = getArticleUrl(selectedArticle);
  // Derive article folder from local_file: strip content/source-articles/article- and .html
  let articleFolder = '';
  if (selectedArticle.local_file) {
    let m = selectedArticle.local_file.match(/^content\/source-articles\/article-(.+)\.html$/);
    if (m) articleFolder = m[1];
  }
  try {
    let res = await fetch(selectedArticle.local_file);
    let html = await res.text();
    articleTitle = getTitle(html) || selectedArticle.title || '';
    let text = stripHtml(html);
    articleText = text.slice(0, 3000);
    // Images
    const imageSrcs = extractImagesFromHtml(html, articleFolder);
    document.getElementById('imagesPlaceholder').style.display = 'none';
    document.getElementById('imagesGrid').style.display = '';
    renderImageThumbnails(imageSrcs);
  } catch (e) {
    articleTitle = selectedArticle.title || '';
    articleText = '';
    document.getElementById('imagesPlaceholder').style.display = '';
    document.getElementById('imagesGrid').style.display = 'none';
    renderImageThumbnails([]);
  }
});

// --- Tone Selector ---
document.querySelectorAll('.tone-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('selected'));
    this.classList.add('selected');
    tone = this.getAttribute('data-tone');
  });
});

// --- API Key ---
const apiKeyInput = document.getElementById('apiKeyInput');
apiKeyInput.value = loadApiKey();
apiKeyInput.addEventListener('input', function() {
  saveApiKey(this.value.trim());
});

// --- Generate Button ---
document.getElementById('generateBtn').addEventListener('click', async function() {
  if (!selectedArticle) { alert('Select an article.'); return; }
  let key = apiKeyInput.value.trim();
  if (!key) { alert('Enter your OpenAI API key.'); return; }
  let imagesList = selectedImages.length ? selectedImages.join(', ') : 'none specified';
  let prompt = `You are the content publisher for Given Free Rein — an editorial media platform exploring global horse culture in a National Geographic style. Voice: intelligent, evocative, grounded in place and craft. Never salesy or generic. Always write as someone who has been there.\n\nGenerate three content pieces. Label each exactly as shown.\n\n[INSTAGRAM]\n150-220 words. Strong opening hook. Tell a small story from the article. End with: Full story at the link in bio.\nAdd 10-12 relevant hashtags on a new line.\n\n[FACEBOOK]\n80-120 words. Conversational but intelligent. Lead with what makes this worth reading. End with the article URL. No hashtags.\n\n[NEWSLETTER]\n120-180 words. Written as a personal letter to someone who loves horses and travel. Feel like correspondence not summary. End with: Read the full story here → [URL]\n\nArticle title: ${articleTitle}\nArticle URL: ${articleUrl}\nImages available: ${imagesList}\nTone: ${tone}\n\nArticle text (first 3000 characters):\n${articleText}`;
  let body = {
    model: 'gpt-4o',
    max_tokens: 2000,
    messages: [
      { role: 'user', content: prompt }
    ]
  };
  try {
    let res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('API error');
    let data = await res.json();
    let content = '';
    if (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
      content = data.choices[0].message.content;
    }
    // Parse outputs
    let ig = '', fb = '', nl = '';
    let igMatch = content.match(/\[INSTAGRAM\][\s\S]*?(?=\[FACEBOOK\]|\[NEWSLETTER\]|$)/i);
    let fbMatch = content.match(/\[FACEBOOK\][\s\S]*?(?=\[NEWSLETTER\]|$)/i);
    let nlMatch = content.match(/\[NEWSLETTER\][\s\S]*?$/i);
    ig = igMatch ? igMatch[0].replace(/\[INSTAGRAM\]/i, '').trim() : '';
    fb = fbMatch ? fbMatch[0].replace(/\[FACEBOOK\]/i, '').trim() : '';
    nl = nlMatch ? nlMatch[0].replace(/\[NEWSLETTER\]/i, '').trim() : '';
    document.getElementById('igOutput').value = ig;
    document.getElementById('fbOutput').value = fb;
    document.getElementById('nlOutput').value = nl;
    updateCharCounts();
  } catch (e) {
    alert('Failed to generate content.');
  }
});

// --- Copy Buttons ---
function setupCopy(btnId, taId) {
  let btn = document.getElementById(btnId);
  let ta = document.getElementById(taId);
  btn.addEventListener('click', function() {
    ta.select();
    document.execCommand('copy');
    let orig = btn.textContent;
    btn.textContent = 'Copied ✓';
    btn.disabled = true;
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
  });
  ta.addEventListener('input', updateCharCounts);
}
setupCopy('igCopy', 'igOutput');
setupCopy('fbCopy', 'fbOutput');
setupCopy('nlCopy', 'nlOutput');

// --- Clear Button ---
document.getElementById('clearBtn').addEventListener('click', function() {
  resetOutputs();
});

// --- Init ---
loadArticles();
updateCharCounts();
// End of script
</script>
</body>
</html>
