<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Given Free Rein Publisher</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'DM Sans', Arial, sans-serif;
      background: #f5f1ea;
      color: #2a3d2a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      background: #2a3d2a;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      position: relative;
    }
    .header-text { display: flex; flex-direction: column; gap: 3px; }
    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 400;
      color: #fff;
      margin: 0;
      line-height: 1;
    }
    .header-sub {
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 12px;
      color: #a0b8a0;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin: 0;
    }
    .clear-link {
      position: absolute;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      font-size: 12px;
      font-family: 'DM Sans', Arial, sans-serif;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      opacity: 0.8;
    }
    .clear-link:hover { opacity: 1; }

    /* LAYOUT */
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* LEFT PANEL */
    .left-panel {
      width: 380px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #e8e3da;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9a9488;
      font-weight: 500;
      margin-bottom: 8px;
    }

    select {
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 13px;
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd8d0;
      border-radius: 6px;
      background: #f5f1ea;
      color: #2a3d2a;
      appearance: none;
      cursor: pointer;
    }

    /* TONE BUTTONS */
    .tone-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .tone-btn {
      padding: 8px 6px;
      border-radius: 6px;
      border: 1px solid #ddd8d0;
      background: #f5f1ea;
      color: #2a3d2a;
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      text-align: center;
    }
    .tone-btn.selected {
      background: #2a3d2a;
      color: #fff;
      border-color: #2a3d2a;
    }

    /* API KEY INPUTS */
    input[type="text"],
    input[type="password"] {
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 13px;
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd8d0;
      border-radius: 6px;
      background: #fff;
      color: #2a3d2a;
    }
    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus {
      outline: none;
      border-color: #2a3d2a;
    }

    /* IMAGES GRID */
    .images-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 4px;
    }
    .img-thumb {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
      background: #f5f1ea;
      position: relative;
      display: block;
    }
    .img-thumb-wrap {
      position: relative;
      cursor: pointer;
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .img-thumb-wrap img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
    }
    .img-thumb-wrap.selected {
      border-color: #2a3d2a;
    }
    .img-thumb-wrap .checkmark {
      display: none;
      position: absolute;
      top: 5px;
      right: 5px;
      width: 20px;
      height: 20px;
      background: #2a3d2a;
      color: #fff;
      border-radius: 50%;
      font-size: 11px;
      align-items: center;
      justify-content: center;
    }
    .img-thumb-wrap.selected .checkmark { display: flex; }

    .img-counter {
      font-size: 11px;
      color: #9a9488;
      margin-top: 6px;
    }
    .images-placeholder {
      font-size: 12px;
      color: #9a9488;
      margin-top: 4px;
    }

    /* BUTTONS */
    .generate-btn {
      width: 100%;
      background: #2a3d2a;
      color: #fff;
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .generate-btn:hover { background: #3a5c3a; }
    .generate-btn:active { background: #1d291d; }

    .mailerlite-btn {
      width: 100%;
      background: #4a7a4a;
      color: #fff;
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .mailerlite-btn:hover { background: #5a8f5a; }
    .mailerlite-btn:active { background: #3a6a3a; }

    .ml-status {
      font-size: 11px;
      color: #4a7a4a;
      min-height: 16px;
    }

    /* RIGHT PANEL */
    .right-panel {
      flex: 1;
      background: #f5f1ea;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .output-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e8e3da;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.ig { background: #5a6bbf; }
    .dot.fb { background: #1877f2; }
    .dot.nl { background: #c17f2a; }
    .dot.rb { background: #8b5cf6; }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 400;
      color: #2a3d2a;
      margin: 0;
      flex: 1;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .char-count {
      font-size: 11px;
      color: #b0aa9e;
      font-family: 'DM Sans', Arial, sans-serif;
    }

    .copy-btn {
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 11px;
      color: #2a3d2a;
      background: transparent;
      border: 1px solid #ddd8d0;
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .copy-btn:hover {
      background: #f5f1ea;
      border-color: #b0aa9e;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 14px;
      border: none;
      background: transparent;
      color: #2a3d2a;
      resize: vertical;
      padding: 0;
      outline: none;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-text">
      <div class="header-title">Given Free Rein</div>
      <div class="header-sub">Publisher</div>
    </div>
    <button class="clear-link" id="clearBtn">Clear</button>
  </header>

  <div class="main">

    <div class="left-panel">

      <div>
        <div class="section-label">Article</div>
        <select id="articleSelect">
          <option value="" disabled selected>Loading articles…</option>
        </select>
      </div>

      <div>
        <div class="section-label">Tone</div>
        <div class="tone-grid">
          <button class="tone-btn selected" data-tone="Editorial">Editorial</button>
          <button class="tone-btn" data-tone="Warm & conversational">Warm &amp; conversational</button>
          <button class="tone-btn" data-tone="Literary & evocative">Literary &amp; evocative</button>
          <button class="tone-btn" data-tone="Factual & informative">Factual &amp; informative</button>
        </div>
      </div>

      <div>
        <div class="section-label">OpenAI API Key</div>
        <input type="text" id="apiKeyInput" placeholder="sk-…" autocomplete="off" />
      </div>

      <div>
        <div class="section-label">MailerLite API Key</div>
        <input type="password" id="mlKeyInput" placeholder="API key" autocomplete="off" />
      </div>

      <div>
        <div class="section-label">Images</div>
        <div id="imagesPlaceholder" class="images-placeholder">Select an article to load images</div>
        <div class="images-grid" id="imagesGrid" style="display:none;"></div>
        <div id="imgCounter" class="img-counter"></div>
      </div>

      <button class="generate-btn" id="generateBtn">Generate</button>
      <button class="mailerlite-btn" id="mailerliteBtn">Create Newsletter Draft</button>
      <div class="ml-status" id="mlStatus"></div>

    </div>

    <div class="right-panel">

      <div class="output-card" id="igCard">
        <div class="card-header">
          <span class="dot ig"></span>
          <span class="card-title">Instagram</span>
          <div class="card-actions">
            <span class="char-count" id="igCount">0</span>
            <button class="copy-btn" id="igCopy">Copy</button>
          </div>
        </div>
        <textarea id="igOutput" spellcheck="true"></textarea>
      </div>

      <div class="output-card" id="fbCard">
        <div class="card-header">
          <span class="dot fb"></span>
          <span class="card-title">Facebook</span>
          <div class="card-actions">
            <span class="char-count" id="fbCount">0</span>
            <button class="copy-btn" id="fbCopy">Copy</button>
          </div>
        </div>
        <textarea id="fbOutput" spellcheck="true"></textarea>
      </div>

      <div class="output-card" id="nlCard">
        <div class="card-header">
          <span class="dot nl"></span>
          <span class="card-title">Newsletter</span>
          <div class="card-actions">
            <span class="char-count" id="nlCount">0</span>
            <button class="copy-btn" id="nlCopy">Copy</button>
          </div>
        </div>
        <textarea id="nlOutput" spellcheck="true"></textarea>
      </div>

      <div class="output-card" id="rbCard">
        <div class="card-header">
          <span class="dot rb"></span>
          <span class="card-title">Reel Brief</span>
          <div class="card-actions">
            <span class="char-count" id="rbCount">0</span>
            <button class="copy-btn" id="rbCopy">Copy</button>
          </div>
        </div>
        <textarea id="rbOutput" spellcheck="true"></textarea>
      </div>

    </div>
  </div>

  <script>
    // --- State ---
    let articles = [];
    let selectedArticle = null;
    let articleText = '';
    let articleTitle = '';
    let articleUrl = '';
    let selectedImages = [];
    let imageSrcs = [];
    let tone = 'Editorial';

    // --- Utility ---
    function stripHtml(html) {
      let tmp = document.createElement('div');
      tmp.innerHTML = html.replace(/<script[\s\S]*?<\/script>/gi, '').replace(/<style[\s\S]*?<\/style>/gi, '');
      return (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim();
    }
    function getTitle(html) {
      let m = html.match(/<title>(.*?)<\/title>/i);
      return m ? m[1].trim() : '';
    }
    function getArticleUrl(article) {
      return `https://givenfreerein.com/article-${article.id}.html`;
    }
    function updateCharCounts() {
      document.getElementById('igCount').textContent = document.getElementById('igOutput').value.length;
      document.getElementById('fbCount').textContent = document.getElementById('fbOutput').value.length;
      document.getElementById('nlCount').textContent = document.getElementById('nlOutput').value.length;
      document.getElementById('rbCount').textContent = document.getElementById('rbOutput').value.length;
    }
    function saveApiKey(key) { localStorage.setItem('gfr_api_key', key); }
    function loadApiKey() { return localStorage.getItem('gfr_api_key') || ''; }
    function saveMailerLiteKey(key) { localStorage.setItem('gfr_mailerlite_key', key); }
    function loadMailerLiteKey() { return localStorage.getItem('gfr_mailerlite_key') || ''; }
    function resetOutputs() {
      document.getElementById('igOutput').value = '';
      document.getElementById('fbOutput').value = '';
      document.getElementById('nlOutput').value = '';
      document.getElementById('rbOutput').value = '';
      updateCharCounts();
    }
    function extractImagesFromHtml(html, articleFolder) {
      const imgRegex = /<img[^>]+src=["']([^"'>]+)["'][^>]*>/gi;
      let match, srcs = new Set();
      const prefix = '../../images/';
      const folderPattern = `images/${articleFolder}/`;
      while ((match = imgRegex.exec(html)) !== null) {
        let src = match[1];
        if (src.startsWith(prefix)) {
          let norm = 'images/' + src.slice(prefix.length);
          if (norm.startsWith(folderPattern)) srcs.add(norm);
        }
      }
      return Array.from(srcs);
    }
    function renderImageThumbnails(imageSrcs) {
      const grid = document.getElementById('imagesGrid');
      grid.innerHTML = '';
      selectedImages = [];
      imageSrcs.forEach(src => {
        const wrap = document.createElement('div');
        wrap.className = 'img-thumb-wrap';
        wrap.tabIndex = 0;
        const img = document.createElement('img');
        img.src = src;
        img.alt = src.split('/').pop();
        const check = document.createElement('div');
        check.className = 'checkmark';
        check.textContent = '✓';
        wrap.appendChild(img);
        wrap.appendChild(check);
        wrap.addEventListener('click', function() {
          if (wrap.classList.contains('selected')) {
            wrap.classList.remove('selected');
            selectedImages = selectedImages.filter(f => f !== src);
          } else {
            wrap.classList.add('selected');
            selectedImages.push(src);
          }
          updateImgCounter();
        });
        grid.appendChild(wrap);
      });
      updateImgCounter();
    }
    function updateImgCounter() {
      const n = selectedImages.length;
      document.getElementById('imgCounter').textContent = n ? `${n} image${n === 1 ? '' : 's'} selected` : '';
    }

    // --- Load Articles ---
    async function loadArticles() {
      try {
        let res = await fetch('content/articles.json');
        let data = await res.json();
        articles = data.articles || [];
        articles.sort((a, b) => (b.published_date || '').localeCompare(a.published_date || ''));
        let sel = document.getElementById('articleSelect');
        sel.innerHTML = '<option value="" disabled selected>Select an article…</option>';
        for (let art of articles) {
          sel.innerHTML += `<option value="${art.id}">${art.title || art.id}</option>`;
        }
      } catch (e) {
        console.error('Failed to load articles:', e);
      }
    }

    // --- Article Select ---
    document.getElementById('articleSelect').addEventListener('change', async function() {
      let id = this.value;
      selectedArticle = articles.find(a => a.id === id);
      if (!selectedArticle) return;
      articleUrl = getArticleUrl(selectedArticle);
      let articleFolder = '';
      if (selectedArticle.local_file) {
        let m = selectedArticle.local_file.match(/^content\/source-articles\/article-(.+)\.html$/);
        if (m) articleFolder = m[1];
      }
      try {
        let res = await fetch(selectedArticle.local_file);
        let html = await res.text();
        articleTitle = getTitle(html) || selectedArticle.title || '';
        articleText = stripHtml(html).slice(0, 3000);
        imageSrcs = extractImagesFromHtml(html, articleFolder);
        document.getElementById('imagesPlaceholder').style.display = 'none';
        document.getElementById('imagesGrid').style.display = '';
        renderImageThumbnails(imageSrcs);
      } catch (e) {
        articleTitle = selectedArticle.title || '';
        articleText = '';
        document.getElementById('imagesPlaceholder').style.display = '';
        document.getElementById('imagesGrid').style.display = 'none';
        renderImageThumbnails([]);
      }
    });

    // --- Tone ---
    document.querySelectorAll('.tone-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        tone = this.getAttribute('data-tone');
      });
    });

    // --- API Keys ---
    const apiKeyInput = document.getElementById('apiKeyInput');
    apiKeyInput.value = loadApiKey();
    apiKeyInput.addEventListener('input', function() { saveApiKey(this.value.trim()); });

    const mlKeyInput = document.getElementById('mlKeyInput');
    mlKeyInput.value = loadMailerLiteKey();
    mlKeyInput.addEventListener('input', function() { saveMailerLiteKey(this.value.trim()); });

    // --- Generate ---
    document.getElementById('generateBtn').addEventListener('click', async function() {
      if (!selectedArticle) { alert('Select an article.'); return; }
      let key = apiKeyInput.value.trim();
      if (!key) { alert('Enter your OpenAI API key.'); return; }
      let imagesList = selectedImages.length ? selectedImages.join(', ') : 'none specified';
      let prompt = `You are the content publisher for Given Free Rein — an editorial media platform exploring global horse culture in a National Geographic style. Voice: intelligent, evocative, grounded in place and craft. Never salesy or generic. Always write as someone who has been there.\n\nGenerate three content pieces. Label each exactly as shown.\n\n[INSTAGRAM]\n150-220 words. Strong opening hook. Tell a small story from the article. End with: Full story at the link in bio.\nAdd 10-12 relevant hashtags on a new line.\n\n[FACEBOOK]\n80-120 words. Conversational but intelligent. Lead with what makes this worth reading. End with the article URL. No hashtags.\n\n[NEWSLETTER]\n120-180 words. Written as a personal letter to someone who loves horses and travel. Feel like correspondence not summary. Do not start with a single word or sentence fragment. Begin directly with the letter. End with: Read the full story here → ${articleUrl}\n\n[REEL BRIEF]\nCreate a reel brief for a short Instagram slideshow reel (15-30 seconds) that teases the article and drives viewers to read the full story.\n\nFormat exactly as:\n\nIMAGES (in order):\n1. [filename] — [one punchy editorial line, up to 10 words, magazine cover style, makes viewer want to know more]\n2. [filename] — [same style]\n3. [filename] — [same style]\n4. [filename] — [same style]\n5. [filename] — [same style]\n\nFINAL FRAME: "Read the full story at givenfreerein.com" (or a variation that feels natural)\n\nMUSIC: [specific style suggestion tied to the article's region and culture — e.g. "Flamenco guitar, slow and atmospheric" not just "Spanish music"]\n\nCAPTION: [One line for the reel caption that complements but does not repeat the main Instagram caption]\n\nThe overall feel should be: editorial documentary teaser, not influencer content. Think National Geographic short. Each line should raise a question the article answers. Do not add any closing commentary or explanation after the reel brief. End after the CAPTION line.\n\nAvailable images (use ONLY these exact filenames): ${imageSrcs.length ? imageSrcs.map(s => s.split('/').pop()).join(', ') : 'no images available'}\n\nArticle title: ${articleTitle}\nArticle URL: ${articleUrl}\nImages available: ${imagesList}\nTone: ${tone}\n\nArticle text (first 3000 characters):\n${articleText}`;
      try {
        let res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${key}`
          },
          body: JSON.stringify({ model: 'gpt-4o', max_tokens: 2000, messages: [{ role: 'user', content: prompt }] })
        });
        if (!res.ok) throw new Error('API error');
        let data = await res.json();
        let content = data.choices?.[0]?.message?.content || '';
        let igMatch = content.match(/\[INSTAGRAM\][\s\S]*?(?=\[FACEBOOK\]|\[NEWSLETTER\]|\[REEL BRIEF\]|$)/i);
        let fbMatch = content.match(/\[FACEBOOK\][\s\S]*?(?=\[NEWSLETTER\]|\[REEL BRIEF\]|$)/i);
        let nlMatch = content.match(/\[NEWSLETTER\][\s\S]*?(?=\[REEL BRIEF\]|$)/i);
        let rbMatch = content.match(/\[REEL BRIEF\][\s\S]*?$/i);
        document.getElementById('igOutput').value = igMatch ? igMatch[0].replace(/\[INSTAGRAM\]/i, '').trim() : '';
        document.getElementById('fbOutput').value = fbMatch ? fbMatch[0].replace(/\[FACEBOOK\]/i, '').trim() : '';
        document.getElementById('nlOutput').value = nlMatch ? nlMatch[0].replace(/\[NEWSLETTER\]/i, '').trim() : '';
        document.getElementById('rbOutput').value = rbMatch ? rbMatch[0].replace(/\[REEL BRIEF\]/i, '').trim() : '';
        updateCharCounts();
      } catch (e) {
        alert('Failed to generate content.');
      }
    });

    // --- Copy ---
    function setupCopy(btnId, taId) {
      let btn = document.getElementById(btnId);
      let ta = document.getElementById(taId);
      btn.addEventListener('click', function() {
        ta.select();
        document.execCommand('copy');
        let orig = btn.textContent;
        btn.textContent = 'Copied ✓';
        btn.disabled = true;
        setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
      });
      ta.addEventListener('input', updateCharCounts);
    }
    setupCopy('igCopy', 'igOutput');
    setupCopy('fbCopy', 'fbOutput');
    setupCopy('nlCopy', 'nlOutput');
    setupCopy('rbCopy', 'rbOutput');

    // --- Clear ---
    document.getElementById('clearBtn').addEventListener('click', resetOutputs);

    // --- MailerLite ---
    document.getElementById('mailerliteBtn').addEventListener('click', async function() {
      const mlKey = mlKeyInput.value.trim();
      if (!mlKey) { alert('Enter your MailerLite API key'); return; }
      const nlContent = document.getElementById('nlOutput').value;
      if (!nlContent) { alert('Generate content first'); return; }
      const status = document.getElementById('mlStatus');
      try {
        const res = await fetch('https://connect.mailerlite.com/api/campaigns', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + mlKey,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            subject: articleTitle,
            name: articleTitle + ' - ' + new Date().toLocaleDateString(),
            type: 'regular',
            emails: [{
              subject: articleTitle,
              from: 'hello.givenfreerein@gmail.com',
              from_name: 'Given Free Rein',
              content: nlContent
            }]
          })
        });
        if (res.ok) {
          status.textContent = 'Draft created in MailerLite ✓';
          status.style.color = '#4a7a4a';
        } else {
          const err = await res.json();
          status.textContent = 'Error: ' + (err.message || res.status);
          status.style.color = '#c0392b';
        }
      } catch (e) {
        status.textContent = 'Failed to connect to MailerLite';
        status.style.color = '#c0392b';
      }
    });

    // --- Init ---
    loadArticles();
    updateCharCounts();
  </script>

</body>
</html>
